name: CodeQL

# GitHub's native SAST — scans the JavaScript MCP server for security issues. Findings
# land in Security → Code scanning. Free for public repositories. When the Kotlin agents
# land (Phase 3+), add a java-kotlin analyze job — and mind the sibling repo's lesson:
# keep the Kotlin version within CodeQL's supported range.
#
# Dev runs are informational; the gate is the release PR into main.

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

# Least privilege at the top level; the analyze job elevates only what CodeQL needs.
permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (javascript)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          languages: javascript
          queries: security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          category: "/language:javascript"
