name: CodeQL

# GitHub's native SAST — scans the JavaScript MCP server for security issues. Findings
# land in Security → Code scanning. Free for public repositories. When the Kotlin agents
# land (Phase 3+), add a java-kotlin analyze job — and mind the sibling repo's lesson:
# keep the Kotlin version within CodeQL's supported range.
#
# Dev runs are informational; the gate is the release PR into main.

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

# Least privilege at the top level; the analyze job elevates only what CodeQL needs.
permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (javascript)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          languages: javascript
          queries: security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          category: "/language:javascript"

  # BOTH JVM agents in ONE java-kotlin analysis (build-mode manual = the most precise):
  # the Kotlin Paper agent (agents/paper) AND the Java Fabric client agent (agents/fabric)
  # are traced-compiled inside the same CodeQL trace, so both are actually scanned — a
  # manual-mode job only sees what it compiles, so leaving the Fabric compile out would
  # silently exclude its token/handshake/loopback code behind a green check. Kotlin is
  # pinned to 2.4.0 to stay in CodeQL's supported range (see agents/paper/build.gradle.kts);
  # bump only together with CodeQL. The Fabric compile pulls the Loom/Minecraft deps
  # (heavy on a cold cache); setup-gradle caches ~/.gradle so subsequent runs are warm.
  analyze-jvm-agents:
    name: Analyze (java-kotlin)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          languages: java-kotlin
          build-mode: manual
          queries: security-and-quality
      - name: Traced compile — Paper agent (Kotlin)
        run: ./gradlew compileKotlin --rerun-tasks --no-build-cache --no-daemon --stacktrace
        working-directory: agents/paper
      - name: Traced compile — Fabric client agent (Java)
        run: ./gradlew compileJava --rerun-tasks --no-build-cache --no-daemon --stacktrace
        working-directory: agents/fabric
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          category: "/language:java-kotlin"
