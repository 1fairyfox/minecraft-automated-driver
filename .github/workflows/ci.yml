name: CI

# The full local gate, run remotely: install exactly the lockfile, run the test suite,
# check every doc link. Grows with the phases (agent gradle builds, client gametests)
# — see notes/plans/roadmap-2026-07.md Phase 7.

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]

# Least privilege at the top level (supply-chain-hardening standard).
permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    env:
      # Job-level so the Sonar step's `if:` can test it (step-level env is invisible
      # to the step's own condition).
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Install (lockfile-exact)
        run: npm ci

      - name: Test
        run: npm test

      - name: Audit (fail on any known vulnerability — no parked findings)
        run: npm audit --audit-level=low

      - name: Link check
        run: node scripts/check-links.mjs

      - name: Docs site builds (self-verifying — fails on any unresolved placeholder)
        run: node scripts/build-docs.mjs

      # Non-blocking: publish coverage to Codecov (the badge + PR annotations). Public
      # repos work tokenless but rate-limited; CODECOV_TOKEN is recommended (owner step:
      # `gh secret set CODECOV_TOKEN`). c8's lcov output is Codecov-native.
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: 1fairyfox/minecraft-automated-driver
          files: coverage/lcov.info
          fail_ci_if_error: false

      # SonarQube Cloud CI-based scan (reads sonar-project.properties; imports the c8
      # lcov as coverage). Requires SONAR_TOKEN and Automatic Analysis DISABLED on the
      # SonarCloud project (the two are mutually exclusive). Skips itself if the token
      # is absent, so forks and tokenless clones stay green.
      - name: SonarQube Cloud scan
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8.2.1

  # The Fabric client agent (agents/fabric) — Java + Loom. Fast job: compile + the pure-logic
  # JUnit suite + the JaCoCo ≥90 gate on the introspection/gate/handshake classes. The first
  # run downloads the deobfuscated Minecraft client (multi-GB); setup-gradle caches ~/.gradle
  # (incl. Loom's cache) so every run after is warm. The heavy real-client gametest is a
  # SEPARATE job below, gated to release PRs only.
  fabric-build:
    name: Fabric client agent (build + JaCoCo ≥90)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: Build the agent (compile + unit tests + JaCoCo verify)
        run: ./gradlew build --no-daemon --stacktrace
        working-directory: agents/fabric

  # The REAL headless client gametest (Loom production run + XVFB). Boots a real client with
  # the agent enabled and drives it over the loopback control plane (introspect the title
  # screen, click a button by name) + asserts a wrong token is refused. Runs on PRs into
  # main + manual dispatch (heavy: asset download + a rendering client). `timeout-minutes`
  # is a safety net: if the client ever crashes, xvfb-run can leave the Gradle task idle
  # rather than propagating the exit (that's how a loader<0.17.3 crash once "hung" >3h) —
  # the timeout turns any such crash into a fast, visible failure instead.
  fabric-client-gametest:
    name: Fabric client gametest (headless)
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 25
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: Install XVFB (headless virtual framebuffer for the client)
        run: sudo apt-get update && sudo apt-get install -y xvfb
      - name: Run the headless client gametest
        run: ./gradlew runProductionClientGameTest --no-daemon --stacktrace
        working-directory: agents/fabric
      - name: Upload gametest screenshots
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fabric-client-gametest-screenshots
          path: agents/fabric/build/run/clientGameTest/screenshots
          if-no-files-found: ignore

  # REAL proof of the Phase-5 "instance" mode: the DRIVER spawns a real Fabric client
  # (agent enabled, no launcher/account) via the Loom production client, connects over the
  # loopback control plane, drives it (introspect + click by name), refuses a bad token, and
  # kills it. Heavy (boots a rendering client under XVFB) — PRs into main + dispatch, timeout.
  client-spawn-smoke:
    name: Client spawn smoke (driver → real client)
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Install XVFB (headless virtual framebuffer for the spawned client)
        run: sudo apt-get update && sudo apt-get install -y xvfb
      - run: node scripts/client-spawn-smoke.mjs

  # The Paper agent is its own Gradle build (agents/paper) — Kotlin, MockBukkit tests,
  # Kover ≥90 gate in `check`. JDK 21 is provisioned by the Gradle toolchain.
  agent-build:
    name: Paper agent (build + Kover ≥90)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: Build the agent (tests + Kover verify + shaded jar)
        run: ./gradlew build --no-daemon --stacktrace
        working-directory: agents/paper

  # Real-machine proof of the L3 exit criteria (roadmap Phase 3): the DRIVER builds the
  # agent, boots a real Paper server with it enabled, connects over the loopback control
  # plane, queries state, execs a console command, and verifies a wrong token is refused.
  agent-smoke:
    name: Agent smoke (control plane)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: node scripts/agent-smoke.mjs

  # Real-machine proof of the L2 exit criteria (roadmap Phase 5): boot a local offline
  # Paper server and join it with a REAL Mineflayer bot (a Minecraft client on the wire),
  # then read state, chat, read inventory, and walk. No mocks.
  bot-smoke:
    name: Bot smoke (Mineflayer)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: node scripts/bot-smoke.mjs --force-java-download

  # Real-machine proof of the L1 exit criteria (roadmap Phase 2): auto-provision a
  # JRE (deliberately NO setup-java — the driver must fetch its own), download a real
  # Paper server, boot it to "Done", drive the console, stop it. No mocks.
  server-smoke:
    name: Server smoke (Paper 1.21.11)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # --force-java-download: the runner HAS a Java; ignore it so the driver's
      # Adoptium auto-provision path is what actually boots the server.
      - run: node scripts/server-smoke.mjs --force-java-download

  # Real-machine proof of the L0 exit criteria (roadmap Phase 1): spawn a windowed
  # app on a Windows runner, enumerate it, screenshot it (PrintWindow), close it.
  # The unit suite covers the logic cross-platform; this covers reality.
  os-smoke:
    name: OS-layer smoke (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: node scripts/os-smoke.mjs
