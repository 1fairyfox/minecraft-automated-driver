# Fabric client agent — build coordinates. A Fabric mod compiles against the deobfuscated
# client for one EXACT Minecraft version (unlike the Paper agent, which compiles against the
# Bukkit API across the 1.21 line). Keep minecraft_version in step with the servers this
# client is meant to join — a client only connects to a server of the same protocol version.
org.gradle.jvmargs=-Xmx2G
org.gradle.parallel=true

minecraft_version=1.21.11
yarn_mappings=1.21.11+build.1
# >=0.17.3 REQUIRED: fabric-api 0.141.4 modules hard-refuse older loaders and the client
# crashes at KnotClient.main ("requires version 0.17.3 or later"). Confirmed from the CI
# gametest crash log 2026-07-24. Keep this at/above the fabric-api's floor.
loader_version=0.17.3
# Newest fabric-api built for 1.21.11 (per Fabric maven metadata). The suffix must match
# minecraft_version exactly — fabric-api is published per Minecraft version, not as a range.
fabric_version=0.141.4+1.21.11
loom_version=1.13-SNAPSHOT

maven_group=io.fairyfox.minecraft.automateddriver
archives_base_name=minecraft-automated-driver-fabric-agent
