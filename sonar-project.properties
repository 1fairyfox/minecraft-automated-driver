# SonarQube Cloud (formerly SonarCloud) analysis config — bugs, code smells, duplication,
# maintainability / tech-debt, and (CI-scan only) coverage import. Free for public repositories.
#
# HOW THIS RUNS. Two supported paths — pick one on the SonarCloud project's Administration →
# Analysis Method page:
#   1. Automatic Analysis (simplest): SonarCloud clones + scans on every push. No CI step, no
#      SONAR_TOKEN. Caveat: does NOT import external coverage — coverage lives on Codecov.
#   2. CI-based scan (coverage inside Sonar too): ci.yml already carries a token-guarded
#      `SonarSource/sonarqube-scan-action` step; set the SONAR_TOKEN secret and disable
#      Automatic Analysis (the two are mutually exclusive).
#
# KEYS — confirm before trusting. SonarCloud mints its OWN projectKey/organization when the
# project is first imported; they do not always match the GitHub slug/owner. The sibling
# project's live org key was minted from the owner account (junebug12851), so the same
# convention is used here. After importing, open the project's Information page and correct
# these if SonarCloud shows anything different — then confirm one scan passes.
sonar.projectKey=1fairyfox_minecraft-automated-driver
sonar.organization=junebug12851
sonar.projectName=minecraft-automated-driver

# ---------------------------------------------------------------------------------------------
# SCOPE: the MCP server source (src/) and the build-critical repo scripts. Tests are analysed
# for test-smells but not counted as covered/uncovered product code.
# ---------------------------------------------------------------------------------------------
sonar.sources=src,scripts
sonar.tests=test

# Coverage import (CI-based scan only — see path #2 above). c8 emits lcov in CI.
sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.coverage.exclusions=test/**,scripts/**
sonar.cpd.exclusions=test/**

sonar.sourceEncoding=UTF-8
