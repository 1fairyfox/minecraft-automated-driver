# SonarQube Cloud (formerly SonarCloud) analysis config — bugs, code smells, duplication,
# maintainability / tech-debt, and (CI-scan only) coverage import. Free for public repositories.
#
# HOW THIS RUNS. Two supported paths — pick one on the SonarCloud project's Administration →
# Analysis Method page:
#   1. Automatic Analysis (simplest): SonarCloud clones + scans on every push. No CI step, no
#      SONAR_TOKEN. Caveat: does NOT import external coverage — coverage lives on Codecov.
#   2. CI-based scan (coverage inside Sonar too): ci.yml already carries a token-guarded
#      `SonarSource/sonarqube-scan-action` step; set the SONAR_TOKEN secret and disable
#      Automatic Analysis (the two are mutually exclusive).
#
# KEYS — confirm before trusting. SonarCloud mints its OWN projectKey/organization when the
# project is first imported; they do not always match the GitHub slug/owner. The sibling
# project's live org key was minted from the owner account (junebug12851), so the same
# convention is used here. After importing, open the project's Information page and correct
# these if SonarCloud shows anything different — then confirm one scan passes.
sonar.projectKey=1fairyfox_minecraft-automated-driver
sonar.organization=junebug12851
sonar.projectName=minecraft-automated-driver

# ---------------------------------------------------------------------------------------------
# SCOPE: the MCP server source (src/) and the build-critical repo scripts. Tests are analysed
# for test-smells but not counted as covered/uncovered product code.
# ---------------------------------------------------------------------------------------------
sonar.sources=src,scripts
sonar.tests=test

# Coverage import (CI-based scan only — see path #2 above). c8 emits lcov in CI.
sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.coverage.exclusions=test/**,scripts/**
sonar.cpd.exclusions=test/**

# ---------------------------------------------------------------------------------------------
# RULE-SCOPED SUPPRESSION WITH REASON (no-parked-findings standard — never a baseline).
# Sonar's taint-analysis rules flag the driver's backends for "user-controlled" command /
# argument / path / URL construction:
#   S2076 (os command injection) · S2083 (path injection) · S6350 (command arguments) ·
#   S5144 + S7044 + S8476 (request/URL built from user data)
# In this project that IS the product, not a defect: the driver's stated purpose is running
# operator-specified gradle builds, spawning operator-specified processes, provisioning
# servers into operator-specified directories, and downloading artifacts for the
# operator-specified Minecraft version. The only caller is the local MCP client over stdio —
# the same human who could run any command directly; there is no remote or unprivileged input
# path (MCP never listens on a socket; the future agent plane is loopback+token). Trust model
# documented in SECURITY.md ("anyone who can already run processes as you can already do
# everything this tool can"). Suppression is per-rule on the src tree; every other rule —
# including all non-taint security rules, hotspots, bugs, and smells — applies in full.
# ---------------------------------------------------------------------------------------------
sonar.issue.ignore.multicriteria=taint1,taint2,taint3,taint4,taint5,taint6
sonar.issue.ignore.multicriteria.taint1.ruleKey=jssecurity:S2076
sonar.issue.ignore.multicriteria.taint1.resourceKey=src/**
sonar.issue.ignore.multicriteria.taint2.ruleKey=jssecurity:S2083
sonar.issue.ignore.multicriteria.taint2.resourceKey=src/**
sonar.issue.ignore.multicriteria.taint3.ruleKey=jssecurity:S6350
sonar.issue.ignore.multicriteria.taint3.resourceKey=src/**
sonar.issue.ignore.multicriteria.taint4.ruleKey=jssecurity:S5144
sonar.issue.ignore.multicriteria.taint4.resourceKey=src/**
sonar.issue.ignore.multicriteria.taint5.ruleKey=jssecurity:S7044
sonar.issue.ignore.multicriteria.taint5.resourceKey=src/**
sonar.issue.ignore.multicriteria.taint6.ruleKey=jssecurity:S8476
sonar.issue.ignore.multicriteria.taint6.resourceKey=src/**

sonar.sourceEncoding=UTF-8
